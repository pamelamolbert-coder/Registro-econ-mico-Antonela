<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Antonela</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFDF9;
    --paper:#FFFFFF;
    --cream:#FFF3E7;
    --orange:#FF6A2B;
    --orange-dark:#D9490F;
    --orange-soft:#FFE3CF;
    --ink:#2B241E;
    --ink-soft:#7A7068;
    --line:#F0E3D6;
    --green:#3F7A56;
    --green-soft:#E7F3EC;
    --red:#C4432E;
    --red-soft:#FBE7E2;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto;padding:28px 20px 80px;}

  /* Header */
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{
    width:44px;height:44px;border-radius:10px;
    background:linear-gradient(155deg,var(--orange),var(--orange-dark));
    display:flex;align-items:center;justify-content:center;
    color:white;font-family:'Fraunces',serif;font-weight:700;font-size:20px;
    flex-shrink:0;
  }
  h1{font-family:'Fraunces',serif;font-weight:700;font-size:26px;margin:0;line-height:1.1;}
  .brand p{margin:2px 0 0;color:var(--ink-soft);font-size:13px;}

  /* Tabs */
  nav.tabs{display:flex;gap:6px;background:var(--cream);padding:5px;border-radius:12px;margin-bottom:24px;}
  nav.tabs button{
    flex:1;padding:11px 8px;border:none;background:transparent;border-radius:9px;
    font-family:'Inter',sans-serif;font-weight:600;font-size:14px;color:var(--ink-soft);
    cursor:pointer;transition:all .15s ease;
  }
  nav.tabs button.active{background:var(--paper);color:var(--orange-dark);box-shadow:0 1px 4px rgba(217,73,15,.15);}
  nav.tabs button:hover:not(.active){color:var(--ink);}

  .view{display:none;}
  .view.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  /* Balance hero */
  .balance-card{
    background:linear-gradient(155deg,var(--orange) 0%,var(--orange-dark) 100%);
    border-radius:20px;padding:26px 26px 22px;color:white;margin-bottom:18px;
    position:relative;overflow:hidden;
  }
  .balance-card::after{
    content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;
    border-radius:50%;background:rgba(255,255,255,.08);
  }
  .balance-label{font-size:13px;opacity:.85;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
  .balance-amount{font-family:'Fraunces',serif;font-size:44px;font-weight:700;margin:6px 0 2px;letter-spacing:-.01em;}
  .balance-sub{font-size:13px;opacity:.85;}
  .balance-grid{display:flex;gap:22px;margin-top:18px;flex-wrap:wrap;position:relative;}
  .balance-grid div{font-size:13px;opacity:.9;}
  .balance-grid strong{display:block;font-family:'Space Mono',monospace;font-size:17px;font-weight:700;margin-top:2px;}

  /* Stat cards */
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px;}
  @media(max-width:520px){.stats{grid-template-columns:1fr;}}
  .stat{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px;}
  .stat .k{font-size:12px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
  .stat .v{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;margin-top:6px;}
  .stat .v.orange{color:var(--orange-dark);}
  .stat .v.green{color:var(--green);}

  section.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:18px;}
  section.card h2{font-family:'Fraunces',serif;font-size:19px;margin:0 0 4px;}
  section.card .hint{color:var(--ink-soft);font-size:13px;margin:0 0 16px;}

  /* Monthly bars */
  .bars{display:flex;align-items:flex-end;gap:10px;height:150px;padding:10px 4px 0;overflow-x:auto;}
  .bar-col{display:flex;flex-direction:column;align-items:center;min-width:38px;}
  .bar-track{height:110px;width:22px;background:var(--cream);border-radius:6px;display:flex;flex-direction:column-reverse;overflow:hidden;}
  .bar-fill{width:100%;background:linear-gradient(180deg,var(--orange),var(--orange-dark));border-radius:6px 6px 0 0;transition:height .3s ease;}
  .bar-label{font-size:10px;color:var(--ink-soft);margin-top:6px;font-weight:600;}

  /* Forms */
  form.entry{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px;}
  form.entry .full{grid-column:1/-1;}
  @media(max-width:560px){form.entry{grid-template-columns:1fr;}}
  label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
  input, textarea, select{
    width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:9px;
    font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);background:var(--bg);
    transition:border-color .15s ease;
  }
  input:focus, textarea:focus, select:focus{outline:none;border-color:var(--orange);}
  textarea{resize:vertical;min-height:44px;}
  .btn{
    background:var(--orange);color:white;border:none;padding:12px 22px;border-radius:9px;
    font-weight:700;font-size:14px;cursor:pointer;transition:background .15s ease;
    font-family:'Inter',sans-serif;
  }
  .btn:hover{background:var(--orange-dark);}
  .btn.secondary{background:transparent;color:var(--ink-soft);border:1.5px solid var(--line);}
  .btn.secondary:hover{border-color:var(--red);color:var(--red);}
  .form-actions{grid-column:1/-1;display:flex;justify-content:flex-end;gap:10px;margin-top:6px;}

  /* Table / list */
  .list{display:flex;flex-direction:column;gap:8px;margin-top:18px;}
  .row-item{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:14px 14px;border:1px solid var(--line);border-radius:11px;background:var(--bg);
  }
  .row-item .meta{min-width:0;}
  .row-item .title{font-weight:600;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .row-item .date{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .row-item .amt{font-family:'Space Mono',monospace;font-weight:700;font-size:15.5px;white-space:nowrap;}
  .amt.plus{color:var(--green);}
  .amt.minus{color:var(--red);}
  .row-item .actions{display:flex;gap:6px;flex-shrink:0;}
  .icon-btn{
    background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:15px;
    padding:6px;border-radius:6px;line-height:1;
  }
  .icon-btn:hover{background:var(--cream);color:var(--orange-dark);}
  .empty{text-align:center;color:var(--ink-soft);font-size:13.5px;padding:26px 10px;}

  /* Ledger (registro combinado) */
  .ledger-row{display:grid;grid-template-columns:64px 1fr 100px 110px;gap:10px;align-items:center;padding:11px 6px;border-bottom:1px solid var(--line);}
  .ledger-row:last-child{border-bottom:none;}
  .ledger-row .tag{
    font-size:10px;font-weight:700;padding:3px 7px;border-radius:20px;text-align:center;
    text-transform:uppercase;letter-spacing:.03em;
  }
  .tag.op{background:var(--green-soft);color:var(--green);}
  .tag.pay{background:var(--red-soft);color:var(--red);}
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;margin-left:6px;vertical-align:middle;}
  .badge.a{background:var(--green-soft);color:var(--green);}
  .badge.b{background:var(--red-soft);color:var(--red);}
  .badge.ss{background:var(--orange-soft);color:var(--orange-dark);}
  .badge.nom{background:var(--red-soft);color:var(--red);}
  .badge.pend{background:var(--orange-soft);color:var(--orange-dark);}
  .checkbox-row{background:var(--cream);border-radius:9px;padding:12px 14px;}
  .checkbox-label{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;margin-bottom:0;}
  .checkbox-label input{width:auto;accent-color:var(--orange);}
  .icon-btn.check-btn{color:var(--green);font-weight:700;}
  .icon-btn.check-btn:hover{background:var(--green-soft);}
  .split-preview{font-size:12.5px;color:var(--ink-soft);margin-top:8px;padding:10px 12px;background:var(--cream);border-radius:9px;}
  .split-preview strong{color:var(--ink);}

  /* Filter bar */
  .filter-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .filter-toggle{display:flex;background:var(--cream);border-radius:9px;padding:4px;}
  .filter-toggle button{
    padding:8px 16px;border:none;background:transparent;border-radius:6px;
    font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;color:var(--ink-soft);cursor:pointer;
  }
  .filter-toggle button.active{background:var(--paper);color:var(--orange-dark);box-shadow:0 1px 4px rgba(217,73,15,.15);}
  #filter-month, #filter-year{width:auto;min-width:160px;}

  /* Backup section */
  .backup-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .backup-actions .btn{white-space:nowrap;}
  input[type="file"]{display:none;}
  .ledger-row .desc{font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ledger-row .amt{font-family:'Space Mono',monospace;font-size:13.5px;text-align:right;font-weight:600;}
  .ledger-row .bal{font-family:'Space Mono',monospace;font-size:13.5px;text-align:right;color:var(--ink-soft);}
  .ledger-head{display:grid;grid-template-columns:64px 1fr 100px 110px;gap:10px;padding:0 6px 8px;font-size:11px;color:var(--ink-soft);font-weight:700;text-transform:uppercase;letter-spacing:.03em;border-bottom:2px solid var(--ink);}
  .ledger-head .amt, .ledger-head .bal{text-align:right;}

  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:white;padding:11px 20px;border-radius:30px;font-size:13.5px;
    box-shadow:0 6px 20px rgba(0,0,0,.2);opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;
    font-weight:600;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
  .loading{text-align:center;padding:60px 20px;color:var(--ink-soft);}

  /* Lock screen */
  .lock-overlay{
    position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;
    z-index:100;padding:20px;
  }
  .lock-card{
    background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:36px 30px;
    max-width:340px;width:100%;text-align:center;box-shadow:0 10px 30px rgba(43,36,30,.08);
  }
  .lock-card h2{font-family:'Fraunces',serif;font-size:20px;margin:0 0 6px;}
  .lock-card .hint{margin:0 0 16px;}
  .lock-card input{margin-top:0;}
  .lock-error{color:var(--red);font-size:13px;margin-top:10px;min-height:16px;}
</style>
</head>
<body>

<div class="lock-overlay" id="lock-overlay">
  <div class="lock-card">
    <div class="brand-mark" style="margin:0 auto 14px;">A</div>
    <h2 id="lock-title">Ingresá la contraseña</h2>
    <p class="hint" id="lock-hint"></p>
    <input type="password" id="lock-input" placeholder="Contraseña" autocomplete="off">
    <input type="password" id="lock-confirm" placeholder="Confirmá la contraseña" autocomplete="off" style="display:none;margin-top:10px;">
    <button class="btn" id="lock-submit" style="width:100%;margin-top:14px;">Entrar</button>
    <div id="lock-error" class="lock-error"></div>
  </div>
</div>

<div class="wrap" id="wrap-main" style="display:none;">

  <header>
    <div class="brand">
      <div class="brand-mark">A</div>
      <div>
        <h1>Registro Antonela</h1>
        <p>Control de operaciones y nómina</p>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <button class="active" data-tab="resumen">Resumen</button>
    <button data-tab="operaciones">Operaciones</button>
    <button data-tab="nomina">Nómina</button>
  </nav>

  <div id="app">
    <div class="loading">Cargando tu información…</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const $ = (sel, el=document) => el.querySelector(sel);
const $$ = (sel, el=document) => [...el.querySelectorAll(sel)];

let operaciones = [];
let nomina = [];
let editingOp = null;
let editingPay = null;
let filterScope = 'mensual';
let filterMonth = new Date().toISOString().slice(0,7);
let filterYear = new Date().getFullYear();
let resumenModo = 'mes'; // 'mes' | 'anio'
let resumenMesSel = null; // se inicializa en init()
let resumenAnioSel = null;

const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MESES_LARGO = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// Reparto según tipo de facturación
const SPLIT = {
  A: { antonela: 0.40, claudia: 0.60, label: 'Factura A (40% Antonela / 60% Claudia)' },
  B: { antonela: 0.50, claudia: 0.50, label: 'Factura B (50% Antonela / 50% Claudia)' },
};
const TIPO_PAGO_LABEL = { nomina: 'Nómina', ss: 'Seguridad Social' };

function fmtMoney(n){
  const v = Number(n)||0;
  return v.toLocaleString('es-ES',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtDate(d){
  const dt = new Date(d+'T00:00:00');
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});
}
function todayISO(){
  return new Date().toISOString().slice(0,10);
}
function uid(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2,7);
}
function showToast(msg){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._h);
  showToast._h = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ---------- Storage ----------
async function loadData(){
  try{
    const raw = localStorage.getItem('antonela-operaciones');
    operaciones = raw ? JSON.parse(raw) : [];
  }catch(e){ operaciones = []; }
  try{
    const raw = localStorage.getItem('antonela-nomina');
    nomina = raw ? JSON.parse(raw) : [];
  }catch(e){ nomina = []; }
}
async function saveOps(){
  try{
    localStorage.setItem('antonela-operaciones', JSON.stringify(operaciones));
  }catch(e){ showToast('No se pudo guardar. Intenta de nuevo.'); }
}
async function savePay(){
  try{
    localStorage.setItem('antonela-nomina', JSON.stringify(nomina));
  }catch(e){ showToast('No se pudo guardar. Intenta de nuevo.'); }
}

// ---------- Derived data ----------
function opsCobradas(list = operaciones){ return list.filter(o=>o.cobrado!==false); }
function totalGenerado(){ return opsCobradas().reduce((s,o)=>s+Number(o.montoAntonela||0),0); }
function totalClaudia(){ return opsCobradas().reduce((s,o)=>s+Number(o.montoClaudia||0),0); }
function totalFacturacion(){ return opsCobradas().reduce((s,o)=>s+Number(o.totalFacturado||0),0); }
function totalFacturadoPorTipo(tipo){ return opsCobradas().filter(o=>o.tipo===tipo).reduce((s,o)=>s+Number(o.totalFacturado||0),0); }
function totalCobrado(){ return nomina.reduce((s,p)=>s+Number(p.monto||0),0); }
function totalCobradoPorTipo(tipo){ return nomina.filter(p=>p.tipo===tipo).reduce((s,p)=>s+Number(p.monto||0),0); }
function saldoDisponible(){ return totalGenerado() - totalCobrado(); }

function thisMonthKey(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function thisYear(){ return new Date().getFullYear(); }

function keyOf(dateStr){ return dateStr.slice(0,7); } // YYYY-MM
function yearOf(dateStr){ return Number(dateStr.slice(0,4)); }

function sumByMonthKey(list, key, field='monto'){
  return list.filter(x=>keyOf(x.fecha)===key).reduce((s,x)=>s+Number(x[field]||0),0);
}
function sumByYear(list, year, field='monto'){
  return list.filter(x=>yearOf(x.fecha)===year).reduce((s,x)=>s+Number(x[field]||0),0);
}

function last6MonthKeys(){
  const arr = [];
  const d = new Date();
  d.setDate(1);
  for(let i=5;i>=0;i--){
    const dd = new Date(d.getFullYear(), d.getMonth()-i, 1);
    arr.push(`${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}`);
  }
  return arr;
}

// ---------- Render ----------
function render(){
  const app = $('#app');
  const activeTab = $('nav.tabs button.active').dataset.tab;
  app.innerHTML = `
    <div class="view ${activeTab==='resumen'?'active':''}" id="view-resumen">${renderResumen()}</div>
    <div class="view ${activeTab==='operaciones'?'active':''}" id="view-operaciones">${renderOperaciones()}</div>
    <div class="view ${activeTab==='nomina'?'active':''}" id="view-nomina">${renderNomina()}</div>
  `;
  attachHandlers();
}

function renderResumen(){
  const saldo = saldoDisponible();
  const cobradas = opsCobradas();

  // Datos filtrados según el período elegido (mensual o anual)
  const genFiltro = filterScope==='mensual' ? sumByMonthKey(cobradas, filterMonth, 'montoAntonela') : sumByYear(cobradas, filterYear, 'montoAntonela');
  const claudiaFiltro = filterScope==='mensual' ? sumByMonthKey(cobradas, filterMonth, 'montoClaudia') : sumByYear(cobradas, filterYear, 'montoClaudia');
  const cobFiltro = filterScope==='mensual' ? sumByMonthKey(nomina, filterMonth) : sumByYear(nomina, filterYear);
  const facAFiltro = filterScope==='mensual'
    ? cobradas.filter(o=>o.tipo==='A' && keyOf(o.fecha)===filterMonth).reduce((s,o)=>s+Number(o.totalFacturado||0),0)
    : cobradas.filter(o=>o.tipo==='A' && yearOf(o.fecha)===filterYear).reduce((s,o)=>s+Number(o.totalFacturado||0),0);
  const facBFiltro = filterScope==='mensual'
    ? cobradas.filter(o=>o.tipo==='B' && keyOf(o.fecha)===filterMonth).reduce((s,o)=>s+Number(o.totalFacturado||0),0)
    : cobradas.filter(o=>o.tipo==='B' && yearOf(o.fecha)===filterYear).reduce((s,o)=>s+Number(o.totalFacturado||0),0);

  const pendientesCount = operaciones.filter(o=>o.cobrado===false).length;
  const pendientesTotal = operaciones.filter(o=>o.cobrado===false).reduce((s,o)=>s+Number(o.totalFacturado||0),0);

  const periodoLabel = filterScope==='mensual'
    ? (()=>{ const [y,m]=filterMonth.split('-'); return `${MESES_LARGO[Number(m)-1]} ${y}`; })()
    : `Año ${filterYear}`;

  // Años disponibles para el selector (de los datos cargados, o el año actual si no hay nada)
  const allDates = [...operaciones.map(o=>o.fecha), ...nomina.map(p=>p.fecha)].filter(Boolean);
  const yearsSet = new Set(allDates.map(d=>yearOf(d)));
  yearsSet.add(thisYear());
  const years = [...yearsSet].sort((a,b)=>b-a);

  const keys = last6MonthKeys();
  const maxVal = Math.max(1, ...keys.map(k=>Math.max(sumByMonthKey(cobradas,k,'montoAntonela'), sumByMonthKey(nomina,k))));
  const barsHtml = keys.map(k=>{
    const gen = sumByMonthKey(cobradas,k,'montoAntonela');
    const [y,m] = k.split('-');
    const h = Math.round((gen/maxVal)*100);
    return `<div class="bar-col">
      <div class="bar-track"><div class="bar-fill" style="height:${h}%"></div></div>
      <div class="bar-label">${MESES[Number(m)-1]}</div>
    </div>`;
  }).join('');

  // combined ledger (solo operaciones ya cobradas cuentan para el saldo real)
  const entries = [
    ...cobradas.map(o=>({...o, entryType:'op'})),
    ...nomina.map(p=>({...p, entryType:'pay'}))
  ].sort((a,b)=> a.fecha.localeCompare(b.fecha) || (a.entryType==='op'?-1:1));

  let running = 0;
  const withBalance = entries.map(e=>{
    const monto = e.entryType==='op' ? Number(e.montoAntonela||0) : Number(e.monto||0);
    running += e.entryType==='op' ? monto : -monto;
    return {...e, balance:running, _monto:monto};
  }).reverse(); // most recent first

  const ledgerRows = withBalance.length ? withBalance.map(e=>{
    const label = e.entryType==='op' ? 'Venta' : (TIPO_PAGO_LABEL[e.tipo] || 'Nómina');
    const desc = e.entryType==='op'
      ? (escapeHtml(e.inmueble||'Operación') + (e.tipo ? ` <span class="badge ${e.tipo==='A'?'a':'b'}" style="margin-left:4px">Fact. ${e.tipo}</span>` : ''))
      : escapeHtml(e.concepto || (TIPO_PAGO_LABEL[e.tipo]||'Pago de nómina'));
    return `
    <div class="ledger-row">
      <span class="tag ${e.entryType}">${label}</span>
      <span class="desc">${desc}</span>
      <span class="amt ${e.entryType==='op'?'plus':'minus'}" style="color:${e.entryType==='op'?'var(--green)':'var(--red)'}">${e.entryType==='op'?'+':'−'}${fmtMoney(e._monto)}</span>
      <span class="bal">${fmtMoney(e.balance)}</span>
    </div>

        <div class="full" id="op-split-preview"></div>
        <div class="full">
          <label>Inmueble / referencia</label>
          <input type="text" name="inmueble" placeholder="Ej: Piso Calle Mayor 12" value="${op?escapeAttr(op.inmueble):''}">
        </div>
        <div class="full">

function escapeHtml(str){
  if(str===undefined||str===null) return '';
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }

// ---------- Backup: exportar / importar ----------
function downloadFile(filename, content, mime){
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportJSON(){
  const payload = {
    exportedAt: new Date().toISOString(),
    operaciones,
    nomina,
  };
  const fecha = todayISO();
  downloadFile(`registro-antonela-${fecha}.json`, JSON.stringify(payload, null, 2), 'application/json');
  showToast('Copia de seguridad descargada');
}

function csvEscape(val){
  const s = String(val===undefined||val===null?'':val);
  if(/[",\n;]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}

function exportCSV(){
  const entries = [
    ...operaciones.map(o=>({...o, entryType:'op'})),
    ...nomina.map(p=>({...p, entryType:'pay'}))
  ].sort((a,b)=> a.fecha.localeCompare(b.fecha) || (a.entryType==='op'?-1:1));

  let running = 0;
  const rows = entries.map(e=>{
    const monto = e.entryType==='op' ? Number(e.montoAntonela||0) : Number(e.monto||0);
    running += e.entryType==='op' ? monto : -monto;
    if(e.entryType==='op'){
      return [e.fecha, 'Operación', e.tipo, e.inmueble||'', e.cliente||'', e.totalFacturado||0, e.montoAntonela||0, e.montoClaudia||0, '', e.notas||'', running.toFixed(2)];
    }else{
      return [e.fecha, TIPO_PAGO_LABEL[e.tipo]||'Nómina', '', '', '', '', '', '', e.monto||0, e.concepto||'', running.toFixed(2)];
    }
  });

  const header = ['Fecha','Tipo de movimiento','Fact. A/B','Inmueble','Cliente','Total facturado','Tu parte','Parte Claudia','Monto pago nómina/SS','Notas/Concepto','Saldo acumulado'];
  const csv = [header, ...rows].map(r=>r.map(csvEscape).join(';')).join('\n');
  downloadFile(`registro-antonela-${todayISO()}.csv`, '\uFEFF'+csv, 'text/csv;charset=utf-8;');
  showToast('Excel descargado');
}

async function importJSON(file){
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    if(!Array.isArray(data.operaciones) || !Array.isArray(data.nomina)){
      showToast('El archivo no tiene el formato esperado');
      return;
    }
    const ok = confirm('Esto va a reemplazar todos los datos actuales por los de la copia de seguridad. ¿Continuar?');
    if(!ok) return;
    operaciones = data.operaciones;
    nomina = data.nomina;
    await saveOps();
    await savePay();
    showToast('Datos restaurados correctamente');
    render();
  }catch(e){
    showToast('No se pudo leer el archivo. Verificá que sea una copia de seguridad válida.');
  }
}

function updateSplitPreview(){
  const tipoSel = $('#op-tipo');
  const totalInput = $('#op-total');
  const preview = $('#op-split-preview');
  if(!tipoSel || !totalInput || !preview) return;
  const tipo = tipoSel.value;
  const total = parseFloat(totalInput.value) || 0;
  const s = SPLIT[tipo];
  const a = total * s.antonela;
  const c = total * s.claudia;
  preview.innerHTML = `<div class="split-preview">${s.label}<br>Antonela: <strong>${fmtMoney(a)}</strong> · Claudia: <strong>${fmtMoney(c)}</strong></div>`;
}

function attachHandlers(){
  $$('.filter-toggle [data-scope]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      filterScope = btn.dataset.scope;
      render();
    });
  });
  const filterMonthInput = $('#filter-month');

    });
  }
  const filterYearInput = $('#filter-year');
  if(filterYearInput){
    filterYearInput.addEventListener('change', ()=>{

      render();
    });
  }

  const btnExportJson = $('#btn-export-json');
  if(btnExportJson) btnExportJson.addEventListener('click', exportJSON);
  const btnExportCsv = $('#btn-export-csv');

  const btnChangePass = $('#btn-change-pass');
  if(btnChangePass) btnChangePass.addEventListener('click', changePassword);
  const btnImportJson = $('#btn-import-json');
  const fileImport = $('#file-import');
  if(btnImportJson && fileImport){
    btnImportJson.addEventListener('click', ()=> fileImport.click());

  const formOp = $('#form-op');

    formOp.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const fd = new FormData(formOp);
      const tipo = fd.get('tipo');
      const totalFacturado = parseFloat(fd.get('totalFacturado'))||0;
      const s = SPLIT[tipo];
      const data = {
        id: editingOp || uid(),
        fecha: fd.get('fecha'),

        montoAntonela: totalFacturado * s.antonela,

        cobrado: fd.get('cobrado') === 'on',
      };
      if(editingOp){
        const idx = operaciones.findIndex(o=>o.id===editingOp);

      }else{
        operaciones.push(data);
        showToast(data.cobrado ? 'Operación agregada' : 'Operación agregada como pendiente de cobro');
      }
      editingOp = null;
      await saveOps();
      render();
    });
    const cancelBtn = $('#cancel-op');
    if(cancelBtn) cancelBtn.addEventListener('click', ()=>{ editingOp=null; render(); });
  }

  $$('[data-edit-op]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ editingOp = btn.dataset.editOp; render(); window.scrollTo({top:0,behavior:'smooth'}); });
  });
  $$('[data-del-op]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(confirm('¿Eliminar esta operación?')){
        operaciones = operaciones.filter(o=>o.id!==btn.dataset.delOp);
        await saveOps();
        showToast('Operación eliminada');
        render();
      }
    });
  });
  $$('[data-cobrar-op]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const idx = operaciones.findIndex(o=>o.id===btn.dataset.cobrarOp);
      if(idx !== -1){
        operaciones[idx] = {...operaciones[idx], cobrado: true};
        await saveOps();
        showToast('Operación marcada como cobrada');
        render();
      }
    });
  });

  const formPay = $('#form-pay');
  if(formPay){
    formPay.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const fd = new FormData(formPay);
      const data = {
        id: editingPay || uid(),
        fecha: fd.get('fecha'),
        tipo: fd.get('tipo') || 'nomina',
        monto: parseFloat(fd.get('monto'))||0,
        concepto: fd.get('concepto').trim(),
      };
      if(editingPay){
        const idx = nomina.findIndex(p=>p.id===editingPay);
        nomina[idx] = data;
        showToast('Pago actualizado');
      }else{
        nomina.push(data);
        showToast('Pago agregado');
      }
      editingPay = null;
      await savePay();
      render();
    });
    const cancelBtn = $('#cancel-pay');
    if(cancelBtn) cancelBtn.addEventListener('click', ()=>{ editingPay=null; render(); });
  }

  $$('[data-edit-pay]').forEach(btn=>{
    btn.addEventListener('click', ()=>{ editingPay = btn.dataset.editPay; render(); window.scrollTo({top:0,behavior:'smooth'}); });
  });
  $$('[data-del-pay]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(confirm('¿Eliminar este pago?')){
        nomina = nomina.filter(p=>p.id!==btn.dataset.delPay);
        await savePay();
        showToast('Pago eliminado');
        render();
      }
    });
  });
}

// ---------- Pantalla de contraseña ----------
const PASS_KEY = 'antonela-app-pass';

function initLock(){
  const overlay = $('#lock-overlay');
  const wrapMain = $('#wrap-main');
  const title = $('#lock-title');
  const hint = $('#lock-hint');
  const input = $('#lock-input');
  const confirmInput = $('#lock-confirm');
  const submit = $('#lock-submit');
  const errorEl = $('#lock-error');
  const stored = localStorage.getItem(PASS_KEY);
  const isSetup = !stored;

  if(isSetup){
    title.textContent = 'Creá una contraseña';
    hint.textContent = 'La vas a necesitar cada vez que abras el registro en este navegador.';
    confirmInput.style.display = 'block';
  }else{
    title.textContent = 'Ingresá la contraseña';
    hint.textContent = '';
    confirmInput.style.display = 'none';
  }

  function unlock(){
    overlay.style.display = 'none';
    wrapMain.style.display = 'block';
  }

  function handle(){
    errorEl.textContent = '';
    if(isSetup){
      const p1 = input.value;
      const p2 = confirmInput.value;
      if(!p1 || p1.length < 4){ errorEl.textContent = 'Usá al menos 4 caracteres.'; return; }
      if(p1 !== p2){ errorEl.textContent = 'Las contraseñas no coinciden.'; return; }
      localStorage.setItem(PASS_KEY, p1);
      unlock();
    }else{
      if(input.value === localStorage.getItem(PASS_KEY)){
        unlock();
      }else{
        errorEl.textContent = 'Contraseña incorrecta.';
        input.value = '';
        input.focus();
      }
    }
  }

  submit.addEventListener('click', handle);
  input.addEventListener('keydown', e=>{
    if(e.key === 'Enter'){
      if(isSetup) confirmInput.focus();
      else handle();
    }
  });
  confirmInput.addEventListener('keydown', e=>{ if(e.key === 'Enter') handle(); });
  input.focus();
}

async function changePassword(){
  const stored = localStorage.getItem(PASS_KEY);
  const actual = prompt('Ingresá tu contraseña actual:');
  if(actual === null) return;
  if(actual !== stored){ showToast('Contraseña actual incorrecta'); return; }
  const nueva = prompt('Nueva contraseña (mínimo 4 caracteres):');
  if(nueva === null) return;
  if(!nueva || nueva.length < 4){ showToast('Usá al menos 4 caracteres'); return; }
  const confirmacion = prompt('Confirmá la nueva contraseña:');
  if(confirmacion === null) return;
  if(nueva !== confirmacion){ showToast('Las contraseñas no coinciden'); return; }
  localStorage.setItem(PASS_KEY, nueva);
  showToast('Contraseña actualizada');
}

// Init
(async function init(){
  initLock();
  await loadData();
  render();
})();
</script>
